openapi: 3.0.3
info:
  title: Pet Store with Inheritance Example
  description: Demonstrates allOf, components, paths, servers
  version: 1.0.0

servers:
  - url: https://api.petstore.example.com/v1
    description: Production
  - url: http://localhost:8080/v1
    description: Local dev

paths:
  /pets:
    post:
      summary: Create a pet
      operationId: createPet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetCreate'
      responses:
        '200':
          description: Pet created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

components:
  schemas:
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        age:
          type: integer
        species:
          type: string
          enum: [dog, cat, bird, other]

    TaggedPet:
      allOf:
        - $ref: '#/components/schemas/Pet'
        - type: object
          required:
            - tags
          properties:
            tags:
              type: array
              items:
                type: string
            owner:
              type: string

    Dog:
      allOf:
        - $ref: '#/components/schemas/Pet'
        - type: object
          required:
            - breed
          properties:
            breed:
              type: string
            barksLoudly:
              type: boolean
              default: true

    PetCreate: 
      allOf:
        - $ref: '#/components/schemas/Pet'
        - type: object
          properties:
            id:
              type: string
